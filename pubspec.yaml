name: lullora_sleep_app
description: A cross-platform Flutter app for conducting sleep hypnosis research study
publish_to: "none"
version: 1.0.0+10

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.0.0

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Audio
  just_audio: ^0.9.38
  audioplayers: ^6.0.0

  # UI/Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  flutter_dotenv: ^5.1.0
  http: ^1.1.0
  path_provider: ^2.1.0
  wakelock_plus: ^1.2.0 # Keep screen on during SWASH

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/lullora.jpg"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1a1a2e"
  image: "assets/images/lullora_icon.png"
  branding: "assets/images/splash_branding.png"
  branding_mode: bottom
  android_12:
    color: "#1a1a2e"
    image: "assets/images/lullora_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - .env

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
